<svg viewBox="0 0 700 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="700" height="620" fill="#0f1117"/>

  <!-- UI Layer -->
  <rect x="120" y="30" width="460" height="100" rx="10" fill="#1c2333" stroke="#4f8cff" stroke-width="2"/>
  <text x="350" y="58" text-anchor="middle" fill="#4f8cff" font-size="16" font-weight="bold">UI (View)</text>
  <text x="350" y="82" text-anchor="middle" fill="#c7d0e0" font-size="13">LoginScreen, RegisterScreen (Jetpack Compose)</text>
  <text x="350" y="102" text-anchor="middle" fill="#8a94ad" font-size="12">Dibuja el estado actual · Notifica acciones del usuario</text>

  <!-- Arrow 1 down -->
  <line x1="300" y1="130" x2="300" y2="175" stroke="#4f8cff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="180" y="155" fill="#8a94ad" font-size="11">observa StateFlow&lt;AuthState&gt;</text>
  <line x1="400" y1="175" x2="400" y2="130" stroke="#4f8cff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="155" fill="#8a94ad" font-size="11">signIn(), register()</text>

  <!-- ViewModel Layer -->
  <rect x="120" y="180" width="460" height="100" rx="10" fill="#1c2333" stroke="#37c2a1" stroke-width="2"/>
  <text x="350" y="208" text-anchor="middle" fill="#37c2a1" font-size="16" font-weight="bold">ViewModel</text>
  <text x="350" y="232" text-anchor="middle" fill="#c7d0e0" font-size="13">AuthViewModel</text>
  <text x="350" y="252" text-anchor="middle" fill="#8a94ad" font-size="12">Expone StateFlow&lt;AuthState&gt; · Valida datos simples</text>

  <!-- Arrow 2 down -->
  <line x1="300" y1="280" x2="300" y2="325" stroke="#37c2a1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="150" y="305" fill="#8a94ad" font-size="11">usa la interfaz AuthRepository</text>
  <line x1="400" y1="325" x2="400" y2="280" stroke="#37c2a1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="305" fill="#8a94ad" font-size="11">Result&lt;User&gt;</text>

  <!-- Repository Layer -->
  <rect x="120" y="330" width="460" height="110" rx="10" fill="#1c2333" stroke="#f2a93b" stroke-width="2"/>
  <text x="350" y="358" text-anchor="middle" fill="#f2a93b" font-size="16" font-weight="bold">Repository</text>
  <text x="350" y="382" text-anchor="middle" fill="#c7d0e0" font-size="13">AuthRepository (interfaz) / FirebaseAuthRepository (impl.)</text>
  <text x="350" y="402" text-anchor="middle" fill="#8a94ad" font-size="12">Única capa que habla con el SDK de Firebase</text>
  <text x="350" y="420" text-anchor="middle" fill="#8a94ad" font-size="12">Traduce errores técnicos a mensajes en español</text>

  <!-- Arrow 3 down -->
  <line x1="350" y1="440" x2="350" y2="485" stroke="#f2a93b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Firebase Layer -->
  <rect x="170" y="490" width="360" height="90" rx="10" fill="#1c2333" stroke="#e0607e" stroke-width="2"/>
  <text x="350" y="530" text-anchor="middle" fill="#e0607e" font-size="16" font-weight="bold">Firebase Authentication</text>
  <text x="350" y="555" text-anchor="middle" fill="#8a94ad" font-size="12">Servicio externo de autenticación</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#8a94ad"/>
    </marker>
  </defs>
</svg>
